name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust:
    name: Rust checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Format
        run: cargo fmt --all -- --check
      - name: Clippy
        run: cargo clippy -p auralux-core -p auraluxd -p auralux-cli --all-targets -- -D warnings
      - name: Test
        run: cargo test -p auralux-core -p auraluxd -p auralux-cli
      - name: Build daemon and CLI
        run: cargo build --release -p auraluxd -p auralux-cli

  web:
    name: Web checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install dependencies
        run: npm install
      - name: Svelte check
        run: npm run check
      - name: Build GUI and Worker dry run
        run: npm run build
      - name: Worker tests
        run: npm test

  tauri-config:
    name: Tauri config smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check Tauri config paths
        run: |
          test -f apps/tauri/src-tauri/tauri.conf.json
          test -f apps/tauri/src-tauri/Cargo.toml
          test -f LICENSE
          grep -q '"frontendDist": "../../gui/dist"' apps/tauri/src-tauri/tauri.conf.json
