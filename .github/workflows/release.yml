name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version, for example v0.1.0"
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always

jobs:
  build-rust:
    name: Build Rust binaries (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x86_64
            os: ubuntu-latest
            archive: tar.gz
          - name: macos-x86_64
            os: macos-13
            archive: tar.gz
          - name: macos-aarch64
            os: macos-14
            archive: tar.gz
          - name: windows-x86_64
            os: windows-latest
            archive: zip
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Resolve release version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "AURALUX_VERSION=${{ inputs.version }}" >> "$GITHUB_ENV"
          else
            echo "AURALUX_VERSION=${GITHUB_REF_NAME}" >> "$GITHUB_ENV"
          fi
      - name: Build release binaries
        run: cargo build --release -p auraluxd -p auralux-cli
      - name: Stage Unix artifacts
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          pkg="auralux-${AURALUX_VERSION}-${{ matrix.name }}"
          mkdir -p "release/${pkg}"
          cp target/release/auralux "release/${pkg}/"
          cp target/release/auraluxd "release/${pkg}/"
          cp README.md README.zh-CN.md LICENSE NOTICE "release/${pkg}/"
          tar -C release -czf "${pkg}.tar.gz" "${pkg}"
          shasum -a 256 "${pkg}.tar.gz" > "${pkg}.tar.gz.sha256"
      - name: Stage Windows artifacts
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $pkg = "auralux-$($env:AURALUX_VERSION)-${{ matrix.name }}"
          New-Item -ItemType Directory -Force -Path "release/$pkg" | Out-Null
          Copy-Item target/release/auralux.exe "release/$pkg/"
          Copy-Item target/release/auraluxd.exe "release/$pkg/"
          Copy-Item README.md,README.zh-CN.md,LICENSE,NOTICE "release/$pkg/"
          Compress-Archive -Path "release/$pkg" -DestinationPath "$pkg.zip" -Force
          certutil -hashfile "$pkg.zip" SHA256 | Select-Object -Skip 1 -First 1 | ForEach-Object { "$($_.Trim())  $pkg.zip" } | Set-Content "$pkg.zip.sha256"
      - name: Upload Rust artifacts
        uses: actions/upload-artifact@v4
        with:
          name: auralux-${{ matrix.name }}
          path: |
            auralux-*.tar.gz
            auralux-*.tar.gz.sha256
            auralux-*.zip
            auralux-*.zip.sha256
          if-no-files-found: error

  build-web:
    name: Build web assets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Resolve release version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "AURALUX_VERSION=${{ inputs.version }}" >> "$GITHUB_ENV"
          else
            echo "AURALUX_VERSION=${GITHUB_REF_NAME}" >> "$GITHUB_ENV"
          fi
      - name: Install dependencies
        run: npm install
      - name: Build GUI
        run: npm --workspace apps/gui run build
      - name: Stage GUI artifact
        shell: bash
        run: |
          set -euo pipefail
          pkg="auralux-web-${AURALUX_VERSION}"
          mkdir -p "release/${pkg}"
          cp -R apps/gui/dist "release/${pkg}/dist"
          cp README.md README.zh-CN.md LICENSE NOTICE "release/${pkg}/"
          tar -C release -czf "${pkg}.tar.gz" "${pkg}"
          shasum -a 256 "${pkg}.tar.gz" > "${pkg}.tar.gz.sha256"
      - name: Worker dry-run build
        run: npm --workspace workers/web-relay run build
      - name: Upload web artifact
        uses: actions/upload-artifact@v4
        with:
          name: auralux-web
          path: |
            auralux-web-*.tar.gz
            auralux-web-*.tar.gz.sha256
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: [build-rust, build-web]
    steps:
      - name: Resolve release version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "AURALUX_VERSION=${{ inputs.version }}" >> "$GITHUB_ENV"
          else
            echo "AURALUX_VERSION=${GITHUB_REF_NAME}" >> "$GITHUB_ENV"
          fi
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - name: List artifacts
        run: find artifacts -maxdepth 2 -type f -print | sort
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.AURALUX_VERSION }}
          name: Auralux ${{ env.AURALUX_VERSION }}
          draft: false
          prerelease: ${{ contains(env.AURALUX_VERSION, '-') }}
          generate_release_notes: true
          files: |
            artifacts/*
